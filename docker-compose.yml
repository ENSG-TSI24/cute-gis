version: '3.9'

services:
  cute-gis:
    build:
      context: .
      dockerfile: Dockerfile
    image: cute-gis:latest
    container_name: cute-gis-container
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    network_mode: "host"
